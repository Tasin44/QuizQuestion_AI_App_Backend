<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Successful</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 40px; }
      .card { max-width: 720px; margin: 0 auto; padding: 24px; border: 1px solid #e5e7eb; border-radius: 12px; }
      .muted { color: #6b7280; }
      a { color: #2563eb; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Google login successful</h1>
      <p class="muted">You can close this window and return to the app.</p>

      <p>
        <a id="continueLink" href="/">Continue</a>
      </p>

      <hr />
      <p class="muted" style="font-size: 14px;">
        Tip: if you want to redirect to your frontend automatically, open this page with a <code>?next=</code> parameter
        (for example <code>?next=https://your-frontend.com</code>).
      </p>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');
        const link = document.getElementById('continueLink');

        if (next && /^https?:\/\//i.test(next)) {
          link.href = next;
          link.textContent = 'Continue to app';
          // auto-redirect after a short delay
          setTimeout(() => {
            window.location.href = next;
          }, 1200);
        }
      })();
    </script>
  </body>
</html>
