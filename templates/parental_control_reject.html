<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parental Control - Rejected</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f5f7fb; color: #1f2a37; margin: 0; }
      .card { max-width: 520px; margin: 10vh auto; background: #ffffff; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 8px 0 0; line-height: 1.5; }
      .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; background: #fff3e0; color: #e65100; }
      .error { background: #ffebee; color: #b71c1c; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge {% if status == 'error' %}error{% endif %}">{{ status|default:"rejected"|title }}</div>
      <h1>Parental control request</h1>
      <p>{{ message }}</p>
    </div>
  </body>
</html>
